name: CI build 0 - (Ubuntu)

on:
  schedule:
    - cron: "14 */2 * * *"
  push:
    branches: [ master ]
  pull_request:
    branches:
  workflow_dispatch:
    branches:

jobs:
  build:

    env:
      PY_COLORS: "1"

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:

    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    # -------------------------------------------------
    # Install system packages
    # -------------------------------------------------

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget ffmpeg gnupg unzip tzdata locales

    # -------------------------------------------------
    # Set locale
    # -------------------------------------------------

    - name: Set Locale
      run: |
        sudo locale-gen en_US.UTF-8
        sudo localectl set-locale LANG="en_US.UTF-8"
        export LANG="en_US.UTF-8"
        sudo update-locale
        locale -a
        locale
        locale -c -k LC_NUMERIC
        localectl status

    # -------------------------------------------------
    # Install Python dependencies
    # -------------------------------------------------

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade wheel setuptools
        pip install "pytest<9"
        pip install -r requirements.txt
        pip install --upgrade pyautogui
        pip install --upgrade python-xlib
        pip install recaptcha-cracker ffmpeg-python
        pip install SpeechRecognition pydub

    # -------------------------------------------------
    # Install Chrome
    # -------------------------------------------------

    - name: Install Chrome
      run: |
        sudo apt-get install -y google-chrome-stable || true

    # -------------------------------------------------
    # Check SeleniumBase
    # -------------------------------------------------

    - name: Check the console scripts interface
      run: |
        seleniumbase
        sbase

    # -------------------------------------------------
    # Install Chromedriver
    # -------------------------------------------------

    - name: Install chromedriver
      run: |
        seleniumbase install chromedriver

    # -------------------------------------------------
    # Verify pytest works
    # -------------------------------------------------

    - name: Make sure pytest is working
      run: |
        echo "def test_1(): pass" > nothing.py
        pytest nothing.py --uc

    # -------------------------------------------------
    # Check Chrome binaries
    # -------------------------------------------------

    - name: Check which Chrome binaries exist
      run: |
        python -c "import os; print(os.path.exists('/usr/bin/google-chrome'))"
        python -c "import os; print(os.path.exists('/bin/google-chrome-stable'))"
        python -c "import os; print(os.path.exists('/bin/chromium-browser'))"
        python -c "import os; print(os.path.exists('/bin/chromium'))"

    # -------------------------------------------------
    # Display Chrome path
    # -------------------------------------------------

    - name: Display Chrome binary that's used
      run: |
        python -c "from seleniumbase.core import detect_b_ver; print(detect_b_ver.get_binary_location('google-chrome'))"
        python -c "from seleniumbase import undetected; print(undetected.find_chrome_executable())"

    # -------------------------------------------------
    # Run debug script
    # -------------------------------------------------

    - name: Run python raw_uc_mode.py --debug
      run: |
        python raw_uc_mode.py --debug

    # -------------------------------------------------
    # Run your Ugeen script
    # -------------------------------------------------

    - name: Ugeen
      run: |
        python ugeen.py
